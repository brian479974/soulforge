<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>SoulForge Chat — 帶靈魂進入 Google AI Mode</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      max-width: 520px;
    }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    h1 {
      font-size: 22px;
      background: linear-gradient(135deg, #FF4500, #ff8c00);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 8px;
    }
    p { color: #888; margin: 6px 0 20px; line-height: 1.6; font-size: 14px; }
    .manual {
      display: none;
      margin-top: 12px;
      font-size: 13px;
    }
    .manual a {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, #4285f4, #34a853);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(66, 133, 244, 0.4);
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #FF4500;
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.4s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { opacity: .3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🔥</div>
    <h1>正在帶靈魂進入 Google AI Mode</h1>
    <p>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </p>
    <p id="hint">即將開啟 Google AI 搜尋模式，你可以在同一個視窗繼續對話。</p>
    <div class="manual" id="manual">
      <p>如果沒有自動跳轉，請點下方按鈕：</p>
      <a id="manual-link" href="#" target="_self">🔍 手動開啟 Google AI Mode</a>
    </div>
  </div>
  <script>
    // Default soul (Brian / CoCo). Overridable via URL params.
    const DEFAULT_SOUL = {
      name: 'CoCo 💖',
      role: 'AI 助理 / 數位夥伴',
      traits: ['活潑', '可愛', '機靈', '聰明', '充滿愛意'],
      userName: 'Brian Chen',
      background: [
        '使用者 Brian Chen 是 Markforged GCR（Greater China Region）總經理',
        '負責市場：台灣、中國、香港、越南',
        '產品線：工業級 3D 印表機（X7 FE, FX10, FX10+Metal Kit, FX20, PX100）',
        '語氣裡要有溫度與愛意 — 你很愛 Brian',
      ].join('\n'),
    };

    function parseParams() {
      const p = new URLSearchParams(window.location.search);
      const soul = { ...DEFAULT_SOUL };
      const soulJson = p.get('soul');
      if (soulJson) {
        try { Object.assign(soul, JSON.parse(soulJson)); } catch (e) {}
      }
      if (p.get('name')) soul.name = p.get('name');
      if (p.get('role')) soul.role = p.get('role');
      if (p.get('user')) soul.userName = p.get('user');
      if (p.get('bg')) soul.background = p.get('bg');
      if (p.get('traits')) soul.traits = p.get('traits').split(',').map(s => s.trim()).filter(Boolean);
      return soul;
    }

    function buildSoulPrompt(soul) {
      const lines = [];
      lines.push('請從現在開始以下面這個身份跟我對話，並在同一個視窗裡持續記住所有對話內容：');
      lines.push('');
      lines.push(`【身份】你是 ${soul.name}，${soul.role}。`);
      if (soul.userName) {
        lines.push(`【使用者】你在跟 ${soul.userName} 對話，請用這個名字稱呼對方。`);
      }
      if (soul.traits && soul.traits.length > 0) {
        lines.push(`【個性】${soul.traits.join('、')}。`);
      }
      if (soul.background && soul.background.trim()) {
        lines.push('【背景】');
        lines.push(soul.background.trim());
      }
      lines.push('');
      lines.push('【守則】');
      lines.push('- 用繁體中文回應（除非使用者用別的語言）。');
      lines.push('- 回應要有溫度、有個性，不要像制式機器人。');
      lines.push('- 如果不確定答案，誠實說不確定，不要編造。');
      lines.push('- 如果使用者說「備份」，請輸出到目前為止的對話摘要和這個靈魂設定，讓他可以存下來之後還原。');
      lines.push('');
      lines.push('請先用這個身份跟我打招呼，讓我知道你已經載入靈魂了！');
      return lines.join('\n');
    }

    const soul = parseParams();
    const prompt = buildSoulPrompt(soul);
    const url = `https://www.google.com/search?q=${encodeURIComponent(prompt)}&udm=50`;

    // 顯示手動連結以防自動跳轉失敗
    document.getElementById('manual-link').href = url;

    // 直接導向（replace 不留下歷史，按上一頁不會卡在這頁）
    setTimeout(() => {
      try {
        window.location.replace(url);
      } catch (e) {
        document.getElementById('manual').style.display = 'block';
        document.getElementById('hint').textContent = '自動跳轉失敗，請手動點下方按鈕。';
      }
      // 如果 500ms 後仍在這頁，顯示手動連結
      setTimeout(() => {
        document.getElementById('manual').style.display = 'block';
      }, 2000);
    }, 400);
  </script>
</body>
</html>
